<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Audit Agent</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header>
      <div>
        <p class="eyebrow">Enterprise AI Control Room</p>
        <h1>知识库审计 Agent</h1>
      </div>
      <span id="health" class="status">连接中</span>
    </header>
    <main>
      <section class="workspace">
        <div class="question-panel">
          <label for="question">向企业制度库提问</label>
          <textarea id="question">销售是否可以直接导出完整客户名单？请说明风险和正确流程。</textarea>
          <div class="actions">
            <button id="ask">运行审计</button>
            <button id="example" class="secondary">加载冲突案例</button>
          </div>
          <p class="hint">回答只基于已检索到的证据，所有结论都保留引用。</p>
        </div>
        <aside class="metrics">
          <div><span>已索引文档</span><strong id="document-count">-</strong></div>
          <div><span>当前模式</span><strong id="mode">本地证据模式</strong></div>
          <div><span>审计记录</span><strong id="audit-count">0</strong></div>
        </aside>
      </section>
      <section class="upload-section">
        <div>
          <p class="panel-label">Document intake</p>
          <h2>上传制度文档</h2>
          <p class="hint">支持 `.txt`、文本型 PDF、`.docx`、`.xlsx`。上传后会立即加入检索索引。</p>
        </div>
        <form id="upload-form" class="upload-form">
          <label for="upload-title">文档标题</label>
          <input id="upload-title" name="title" type="text" minlength="2" maxlength="120" placeholder="例如：客户数据导出补充规范" required />
          <label for="upload-file">文档文件</label>
          <input id="upload-file" name="file" type="file" accept=".txt,.pdf,.docx,.xlsx,text/plain,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" required />
          <div class="actions">
            <button id="upload-button" type="submit">上传并入库</button>
            <span id="upload-status" class="upload-status" role="status"></span>
          </div>
        </form>
      </section>
      <section id="empty" class="empty-state">运行一次审计后，这里会显示回答、证据引用和风险发现。</section>
      <section id="results" hidden>
        <div class="results-toolbar">
          <span class="panel-label">Export</span>
          <div class="actions">
            <button id="export-md" class="secondary" type="button">Markdown</button>
            <button id="export-pdf" class="secondary" type="button">PDF</button>
          </div>
        </div>
        <div class="results-grid">
          <article class="answer">
            <p class="panel-label">带证据回答</p>
            <div id="answer"></div>
          </article>
          <article class="findings">
            <p class="panel-label">风险发现</p>
            <div id="findings"></div>
          </article>
        </div>
        <article class="citations">
          <p class="panel-label">检索证据</p>
          <div id="citations"></div>
        </article>
      </section>
      <section class="document-section">
        <div>
          <p class="panel-label">知识库内容</p>
          <h2>当前索引文档</h2>
        </div>
        <div id="documents" class="document-list"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
