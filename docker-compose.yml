services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_audit}
      POSTGRES_USER: ${POSTGRES_USER:-audit_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audit_app_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data/runtime:/app/data/runtime
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: